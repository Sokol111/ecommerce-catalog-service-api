syntax = "proto3";

package catalog.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/Sokol111/ecommerce-catalog-service-api/gen/go/catalog/v1;catalogv1";

// ==================== ENUMS ====================

enum CategoryAttributeRole {
  CATEGORY_ATTRIBUTE_ROLE_UNSPECIFIED = 0;
  CATEGORY_ATTRIBUTE_ROLE_VARIANT = 1;
  CATEGORY_ATTRIBUTE_ROLE_SPECIFICATION = 2;
}

// ==================== ENTITIES ====================

message CategoryAttribute {
  string attribute_id = 1;
  CategoryAttributeRole role = 2;
  int32 sort_order = 3;
  bool filterable = 4;
  bool searchable = 5;
}

message Category {
  string id = 1;
  int64 version = 2;
  string name = 3;
  bool enabled = 4;
  repeated CategoryAttribute attributes = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp modified_at = 7;
}

// ==================== REQUESTS ====================

message CategoryAttributeInput {
  string attribute_id = 1 [(buf.validate.field).string.uuid = true];
  CategoryAttributeRole role = 2 [(buf.validate.field).enum.defined_only = true];
  optional int32 sort_order = 3 [(buf.validate.field).int32.gte = 0];
  bool filterable = 4;
  bool searchable = 5;
}

message CreateCategoryRequest {
  optional string id = 1 [(buf.validate.field).string.uuid = true];
  string name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
  bool enabled = 3;
  repeated CategoryAttributeInput attributes = 4;
}

message UpdateCategoryRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
  string name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
  bool enabled = 3;
  int64 version = 4 [(buf.validate.field).int64.gte = 0];
  repeated CategoryAttributeInput attributes = 5;
}

message GetCategoryByIdRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message GetCategoryListRequest {
  int32 page = 1 [(buf.validate.field).int32.gte = 1];
  int32 size = 2 [(buf.validate.field).int32 = {
    gte: 1
    lte: 100
  }];
  optional bool enabled = 3;
  optional string sort = 4;
  optional string order = 5;
}

// ==================== RESPONSES ====================

message CreateCategoryResponse {
  Category category = 1;
}

message UpdateCategoryResponse {
  Category category = 1;
}

message GetCategoryByIdResponse {
  Category category = 1;
}

message GetCategoryListResponse {
  repeated Category items = 1;
  int32 page = 2;
  int32 size = 3;
  int64 total = 4;
}

// ==================== SERVICE ====================

service CategoryService {
  rpc CreateCategory(CreateCategoryRequest) returns (CreateCategoryResponse);
  rpc UpdateCategory(UpdateCategoryRequest) returns (UpdateCategoryResponse);
  rpc GetCategoryById(GetCategoryByIdRequest) returns (GetCategoryByIdResponse);
  rpc GetCategoryList(GetCategoryListRequest) returns (GetCategoryListResponse);
}
